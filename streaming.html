<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Streaming Nube - Letra Negra</title>
    <!-- Importar la fuente Anton -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    
    <!-- SDK de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        html, body {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            background: transparent; 
            overflow: hidden;
            font-family: 'Anton', sans-serif;
            /* Se eliminó el borde (-webkit-text-stroke) por completo */
        }
        
        .screen-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
        }
        
        .score-display {
            position: absolute; 
            bottom: 24px; 
            font-size: 14pt; 
            color: #000000; /* Color negro puro */
            line-height: 1;
            min-width: 60px; 
            text-align: center;
        }

        #score-local { 
            left: 349px; 
        }
        
        #score-visitor { 
            right: 349px; 
        }
    </style>
</head>
<body>

    <div class="screen-container">
        <div id="score-local" class="score-display">00</div>
        <div id="score-visitor" class="score-display">00</div>
    </div>

    <script>
        // 🚨 PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE 🚨
        const firebaseConfig = {
            apiKey: "AIzaSyA-tweq9EGXY8yk_R0Y3nlfTPc8JMUQ5AM",
            authDomain: "marcador-transmisiones.firebaseapp.com",
            databaseURL: "https://marcador-transmisiones-default-rtdb.firebaseio.com",
            projectId: "marcador-transmisiones",
            storageBucket: "marcador-transmisiones.firebasestorage.app",
            messagingSenderId: "393444881093",
            appId: "1:393444881093:web:653f5b13733c3abc25f6ac",
            measurementId: "G-64VX9TNRTR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const marcadorRef = db.ref('marcador');

        // Escuchar los datos en tiempo real
        marcadorRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                let loc = data.local.toString().padStart(2, '0');
                let vis = data.visitor.toString().padStart(2, '0');
                
                document.getElementById('score-local').innerText = loc;
                document.getElementById('score-visitor').innerText = vis;
            }
        });
    </script>
</body>
</html>
