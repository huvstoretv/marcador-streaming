<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Marcador NUBE</title>
    <!-- SDK de Firebase (Versión compatible fácil de usar) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #ffaa00; font-size: 24px; margin-bottom: 5px; text-align: center;}
        .status { color: #00cc00; font-size: 12px; margin-bottom: 20px; font-weight: bold; }
        .container { width: 100%; max-width: 500px; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #333; box-sizing: border-box;}
        .team-section { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #444; }
        .team-local { border-left-color: #006847; }
        .team-visitor { border-left-color: #0066cc; }
        .team-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .current-score { font-size: 24px; background: #000; padding: 2px 10px; border-radius: 4px; color: #fff; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
        .btn { background: #333; color: white; border: 1px solid #444; padding: 12px 5px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn:active { background: #555; }
        .btn-minus { background: #552222; border-color: #663333; width: 100%; }
        .btn-reset { width: 100%; background: #4169E1; border: 1px solid #555533; margin-top: 15px; padding: 15px;}
    </style>
</head>
<body>

    <h1>🏈 HUVSTORE.TV 🏈</h1>
    <div class="status" id="conexion">🟢 Conectando a Firebase...</div>

    <div class="container">
        <!-- LOCAL -->
        <div class="team-section team-local">
            <div class="team-title"><span>POTROS AC</span><span class="current-score" id="view-local">00</span></div>
            <div class="btn-grid">
                <button class="btn" onclick="modify('local', 6)">+6</button>
                <button class="btn" onclick="modify('local', 3)">+3</button>
                <button class="btn" onclick="modify('local', 2)">+2</button>
                <button class="btn" onclick="modify('local', 1)">+1</button>
            </div>
            <button class="btn btn-minus" onclick="modify('local', -1)">Corregir (-1)</button>
        </div>

        <!-- VISITANTE -->
        <div class="team-section team-visitor">
            <div class="team-title"><span>HALCONES UV</span><span class="current-score" id="view-visitor">00</span></div>
            <div class="btn-grid">
                <button class="btn" onclick="modify('visitor', 6)">+6</button>
                <button class="btn" onclick="modify('visitor', 3)">+3</button>
                <button class="btn" onclick="modify('visitor', 2)">+2</button>
                <button class="btn" onclick="modify('visitor', 1)">+1</button>
            </div>
            <button class="btn btn-minus" onclick="modify('visitor', -1)">Corregir (-1)</button>
        </div>

        <button class="btn btn-reset" onclick="resetScores()">Reiniciar Todo (00 - 00)</button>
    </div>

    <script>
        // 🚨 REEMPLAZA ESTO CON LOS DATOS DE TU FIREBASE 🚨
        const firebaseConfig = {
            apiKey: "AIzaSyA-tweq9EGXY8yk_R0Y3nlfTPc8JMUQ5AM",
            authDomain: "marcador-transmisiones.firebaseapp.com",
            databaseURL: "https://marcador-transmisiones-default-rtdb.firebaseio.com",
            projectId: "marcador-transmisiones",
            storageBucket: "marcador-transmisiones.firebasestorage.app",
            messagingSenderId: "393444881093",
            appId: "1:393444881093:web:653f5b13733c3abc25f6ac",
            measurementId: "G-64VX9TNRTR"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const marcadorRef = db.ref('marcador');

        let currentScores = { local: 0, visitor: 0 };

        // Escuchar los datos en tiempo real para mostrar en pantalla
        marcadorRef.on('value', (snapshot) => {
            document.getElementById('conexion').innerText = "🟢 Conectado y Sincronizado";
            const data = snapshot.val();
            if (data) {
                currentScores = data;
                document.getElementById('view-local').innerText = currentScores.local.toString().padStart(2, '0');
                document.getElementById('view-visitor').innerText = currentScores.visitor.toString().padStart(2, '0');
            }
        });

        // Modificar puntos
        function modify(team, val) {
            let newScore = currentScores[team] + val;
            if (newScore < 0) newScore = 0;
            if (newScore > 99) newScore = 99;
            
            marcadorRef.update({
                [team]: newScore
            });
        }

        // Reiniciar
        function resetScores() {
            if (confirm('¿Seguro que deseas reiniciar el marcador a 00-00?')) {
                marcadorRef.set({
                    local: 0,
                    visitor: 0
                });
            }
        }
    </script>
</body>
</html>
