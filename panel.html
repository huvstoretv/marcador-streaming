<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control HUV Store.TV</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #ffaa00; font-size: 24px; margin-bottom: 5px; text-align: center;}
        .status { color: #00cc00; font-size: 12px; margin-bottom: 20px; font-weight: bold; }
        .container { width: 100%; max-width: 500px; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; box-sizing: border-box;}
        
        /* =======================================
           NUEVO: ESTILOS DEL SWITCHER DE ESCENAS 
           ======================================= */
        .scene-section { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 2px solid #444; }
        .scene-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #fff; text-align: center; letter-spacing: 1px; }
        .scene-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-scene { background: #333; color: white; border: 2px solid #555; padding: 15px 10px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-scene.active { background: #cc0000; border-color: #ff3333; box-shadow: 0 0 15px rgba(204,0,0,0.6); color: white; }
        .btn-scene:active { transform: scale(0.95); }

        /* Estilos de los Marcadores y Textos (Igual que ayer) */
        .team-section { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #444; }
        .team-local { border-left-color: #135504; }
        .team-visitor { border-left-color: #0715d7; }
        .team-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .current-score { font-size: 24px; background: #000; padding: 2px 10px; border-radius: 4px; color: #fff; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
        .btn { background: #333; color: white; border: 1px solid #444; padding: 12px 5px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn:active { background: #302f2f; }
        .btn-minus { background: #c8c244; border-color: #2578ff; width: 100%; }
        
        /* Estilos de Textos Dinámicos (Cuarto y Categoría) */
        .select-group { margin-bottom: 15px; }
        .select-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; }
        select { width: 100%; padding: 10px; background: #333; color: white; border: 1px solid #555; border-radius: 6px; font-size: 16px; }
        
        .btn-reset { width: 100%; background: #100f3f; border: 1px solid #c0c0c0; margin-top: 15px; padding: 15px; font-weight: bold; color: white;}
    </style>
</head>
<body>

    <h1>🏈 HUVSTORETV 🏈</h1>
    <div class="status" id="conexion">🟢 Conectando a Firebase...</div>

    <div class="container">
        
        <!-- NUEVO: SWITCHER DE ESCENAS -->
        <div class="scene-section">
            <div class="scene-title">🔴 EN VIVO (SWITCHER)</div>
            <div class="scene-grid">
                <button id="btn-marcador" class="btn-scene" onclick="cambiarEscena('marcador')">Marcador / Gráficos</button>
                <button id="btn-presentacion" class="btn-scene" onclick="cambiarEscena('presentacion')">PRESENTACIÓN</button>
                <button id="btn-touch-potros" class="btn-scene" onclick="cambiarEscena('touch-potros')">Touch Potros</button>
                <button id="btn-touch-huv" class="btn-scene" onclick="cambiarEscena('touch-huv')">Touch HUV</button>
                <button id="btn-publicidad" class="btn-scene" onclick="cambiarEscena('publicidad')">X ZONE</button>
                <button id="btn-oculto" class="btn-scene" onclick="cambiarEscena('oculto')">Ocultar Todo</button>
            </div>
        </div>

        <!-- DATOS DEL PARTIDO -->
        <div class="select-group">
            <label>Cuarto de Juego:</label>
            <select id="cuarto-select" onchange="updateText('cuarto', this.value)">
                <option value="1ER CUARTO">1ER CUARTO</option>
                <option value="2DO CUARTO">2DO CUARTO</option>
                <option value="3ER CUARTO">3ER CUARTO</option>
                <option value="4TO CUARTO">4TO CUARTO</option>
                <option value="MEDIO TIEMPO">MEDIO TIEMPO</option>
                <option value="TIEMPO EXTRA">TIEMPO EXTRA</option>
                <option value="FINAL">FINAL</option>
            </select>
        </div>

        <div class="select-group">
            <label>Categoría:</label>
            <select id="categoria-select" onchange="updateText('categoria', this.value)">
                <option value="CATEGORÍA PRE INFANTIL">CATEGORÍA PRE INFANTIL</option>
                <option value="CATEGORÍA ESPECIAL">CATEGORÍA ESPECIAL</option>
                <option value="CATEGORÍA AA">CATEGORÍA AA</option>
                <option value="CATEGORÍA AAA">CATEGORÍA AAA</option>
            </select>
        </div>

        <!-- LOCAL -->
        <div class="team-section team-local">
            <div class="team-title"><span>POTROS AC</span><span class="current-score" id="view-local">00</span></div>
            <div class="btn-grid">
                <button class="btn" onclick="modifyScore('local', 6)">+6</button>
                <button class="btn" onclick="modifyScore('local', 3)">+3</button>
                <button class="btn" onclick="modifyScore('local', 2)">+2</button>
                <button class="btn" onclick="modifyScore('local', 1)">+1</button>
            </div>
            <button class="btn btn-minus" onclick="modifyScore('local', -1)">Corregir (-1)</button>
        </div>

        <!-- VISITANTE -->
        <div class="team-section team-visitor">
            <div class="team-title"><span>HALCONES UV</span><span class="current-score" id="view-visitor">00</span></div>
            <div class="btn-grid">
                <button class="btn" onclick="modifyScore('visitor', 6)">+6</button>
                <button class="btn" onclick="modifyScore('visitor', 3)">+3</button>
                <button class="btn" onclick="modifyScore('visitor', 2)">+2</button>
                <button class="btn" onclick="modifyScore('visitor', 1)">+1</button>
            </div>
            <button class="btn btn-minus" onclick="modifyScore('visitor', -1)">Corregir (-1)</button>
        </div>

        <button class="btn btn-reset" onclick="resetAll()">Reiniciar Marcador</button>
    </div>

    <script>
        // 🚨 PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE 🚨
        const firebaseConfig = {
            apiKey: "AIzaSyA-tweq9EGXY8yk_R0Y3nlfTPc8JMUQ5AM",
            authDomain: "marcador-transmisiones.firebaseapp.com",
            databaseURL: "https://marcador-transmisiones-default-rtdb.firebaseio.com",
            projectId: "marcador-transmisiones",
            storageBucket: "marcador-transmisiones.firebasestorage.app",
            messagingSenderId: "393444881093",
            appId: "1:393444881093:web:653f5b13733c3abc25f6ac",
            measurementId: "G-64VX9TNRTR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const marcadorRef = db.ref('marcador');

        let currentData = { local: 0, visitor: 0, cuarto: "1ER CUARTO", categoria: "CATEGORÍA INFANTIL", escenaActiva: "marcador" };

        marcadorRef.on('value', (snapshot) => {
            document.getElementById('conexion').innerText = "🟢 Conectado y Sincronizado";
            const data = snapshot.val();
            if (data) {
                currentData = data;
                
                // Actualizar marcadores y textos
                document.getElementById('view-local').innerText = (data.local || 0).toString().padStart(2, '0');
                document.getElementById('view-visitor').innerText = (data.visitor || 0).toString().padStart(2, '0');
                if(data.cuarto) document.getElementById('cuarto-select').value = data.cuarto;
                if(data.categoria) document.getElementById('categoria-select').value = data.categoria;

                // Actualizar botonera visualmente (poner en ROJO el botón activo)
                const escenaActual = data.escenaActiva || 'marcador';
                document.querySelectorAll('.btn-scene').forEach(btn => btn.classList.remove('active'));
                const botonActivo = document.getElementById('btn-' + escenaActual);
                if(botonActivo) botonActivo.classList.add('active');
            }
        });

        // NUEVA FUNCIÓN: Cambiar Escena
        function cambiarEscena(nombreEscena) {
            marcadorRef.update({ escenaActiva: nombreEscena });
        }

        // Funciones anteriores
        function modifyScore(team, val) {
            let newScore = (currentData[team] || 0) + val;
            if (newScore < 0) newScore = 0;
            if (newScore > 99) newScore = 99;
            marcadorRef.update({ [team]: newScore });
        }

        function updateText(field, value) {
            marcadorRef.update({ [field]: value });
        }

        function resetAll() {
            if (confirm('¿Seguro que deseas reiniciar el partido?')) {
                marcadorRef.update({
                    local: 0,
                    visitor: 0,
                    cuarto: "1ER CUARTO",
                    categoria: "CATEGORÍA INFANTIL"
                });
            }
        }
    </script>
</body>
</html>
